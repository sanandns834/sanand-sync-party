<!DOCTYPE html>
<html>
<head>
  <title>Sanand's Sync Party</title>

  <script src="/socket.io/socket.io.js"></script>

  <style>
    body {
      margin: 0;
      background: black;
      overflow: hidden;
      font-family: 'Courier New', monospace;
      color: #00ffff;
      text-align: center;
    }

    canvas {
      position: fixed;
      top: 0;
      left: 0;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 2;
      margin-top: 5%;
    }

    h1 {
      font-size: 40px;
      text-shadow: 0 0 15px #00ffff;
    }

    button {
      background: transparent;
      border: 2px solid #00ffff;
      color: #00ffff;
      padding: 12px 30px;
      font-size: 16px;
      border-radius: 30px;
      cursor: pointer;
      transition: 0.3s;
      box-shadow: 0 0 10px #00ffff;
      margin: 10px;
    }

    button:hover {
      background: #00ffff;
      color: black;
      box-shadow: 0 0 25px #00ffff;
    }

    input {
      background: transparent;
      border: 2px solid #ff00ff;
      padding: 12px 20px;
      border-radius: 30px;
      color: white;
      outline: none;
      box-shadow: 0 0 10px #ff00ff;
      margin: 10px;
    }

    .vinyl {
      margin: 30px auto;
      width: 150px;
      height: 150px;
      border-radius: 50%;
      background: radial-gradient(circle, #222 40%, black 60%);
      border: 4px solid #ff00ff;
    }

    .spin {
      animation: spin 3s linear infinite;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    #users {
      margin-top: 15px;
      font-size: 18px;
      color: #ff00ff;
    }

    .upload-section {
      margin-top: 20px;
    }
  </style>
</head>

<body>

<canvas id="stars"></canvas>

<div class="container">
  <h1>⚡ SANAND'S SYNC PARTY ⚡</h1>

  <button onclick="createRoom()">Create Room</button><br>

  <input id="roomCode" placeholder="Enter Room Code">
  <button onclick="joinRoom()">Join Room</button>

  <h3 id="status"></h3>
  <div id="users"></div>

  <button onclick="syncPlay()">DJ Sync Play</button>

  <div class="vinyl" id="vinyl"></div>

  <div class="upload-section">
    <input type="file" id="mp3Upload" accept="audio/mp3">
    <button onclick="uploadSong()">Upload & Play</button>
  </div>

  <audio id="audio"></audio>

</div>

<script>
const socket = io();
let currentRoom = "";
const audio = document.getElementById("audio");
const vinyl = document.getElementById("vinyl");

function createRoom() {
  socket.emit("createRoom");
}

function joinRoom() {
  const code = document.getElementById("roomCode").value;
  socket.emit("joinRoom", code);
}

function syncPlay() {
  socket.emit("syncPlay", currentRoom);
}

function uploadSong() {
  const fileInput = document.getElementById("mp3Upload");
  const file = fileInput.files[0];
  if (!file) return alert("Select an MP3 first");

  const url = URL.createObjectURL(file);
  audio.src = url;
  audio.play();
}

socket.on("roomCreated", (code) => {
  currentRoom = code;
  document.getElementById("status").innerText = "Room Code: " + code;
});

socket.on("roomJoined", (code) => {
  currentRoom = code;
  document.getElementById("status").innerText = "Joined Room: " + code;
});

socket.on("updateUsers", (count) => {
  document.getElementById("users").innerText =
    "Connected Party Members: " + count;
});

socket.on("playNow", () => {
  audio.play();
});

audio.onplay = () => vinyl.classList.add("spin");
audio.onpause = () => vinyl.classList.remove("spin");

/* Star Background */
const canvas = document.getElementById("stars");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let stars = [];
for (let i = 0; i < 150; i++) {
  stars.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    radius: Math.random() * 2,
    speed: Math.random() * 1
  });
}

function drawStars() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = "#00ffff";
  stars.forEach(star => {
    ctx.beginPath();
    ctx.arc(star.x, star.y, star.radius, 0, Math.PI * 2);
    ctx.fill();
    star.y += star.speed;
    if (star.y > canvas.height) star.y = 0;
  });
  requestAnimationFrame(drawStars);
}
drawStars();
</script>

</body>
</html>
